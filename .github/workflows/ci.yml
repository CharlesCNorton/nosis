name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest hypothesis
      - run: |
          pytest \
            tests/test_ir.py \
            tests/test_eval.py \
            tests/test_passes.py \
            tests/test_techmap.py \
            tests/test_json_backend.py \
            tests/test_fsm.py \
            tests/test_bram.py \
            tests/test_dsp.py \
            tests/test_carry.py \
            tests/test_equiv.py \
            tests/test_cse.py \
            tests/test_lutpack.py \
            tests/test_clocks.py \
            tests/test_blackbox.py \
            tests/test_resources.py \
            tests/test_timing.py \
            tests/test_diff.py \
            tests/test_readmem.py \
            tests/test_mutation.py \
            tests/test_congestion.py \
            tests/test_power.py \
            tests/test_constraints.py \
            tests/test_incremental.py \
            tests/test_formal.py \
            tests/test_retiming.py \
            -v

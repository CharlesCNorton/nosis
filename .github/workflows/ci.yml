name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff mypy "pyslang>=7"
      - run: ruff check .
      - run: mypy nosis/ --ignore-missing-imports --no-error-summary --follow-imports=silent

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest hypothesis "pyslang>=7" pytest-cov
      - run: pytest tests/ -v --ignore=tests/test_soc.py --cov=nosis --cov-report=term-missing --cov-fail-under=50

  gate-level-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: sudo apt-get update && sudo apt-get install -y iverilog
      - run: pip install pytest "pyslang>=7"
      - run: pytest tests/test_designs.py -v -k "iverilog"

  nextpnr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: sudo apt-get update && sudo apt-get install -y nextpnr-ecp5 prjtrellis
      - run: pip install pytest "pyslang>=7"
      - run: pytest tests/test_designs.py -v -k "nextpnr"
